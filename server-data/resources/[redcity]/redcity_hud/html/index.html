<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>RedCity HUD</title>
</head>
<body>
    <main id="root">
        <section id="vehicleHud" class="vehicle-hud hidden" aria-hidden="true">
            <div class="road">
                <div class="direction">
                    <span id="direction">NORTH</span>
                    <span id="voiceChip" class="voice-chip">Normal</span>
                </div>
                <div id="street" class="street">RedCity</div>
            </div>

            <div class="speed-block">
                <svg class="speed-ring" viewBox="0 0 74 74">
                    <circle class="ring-bg" cx="37" cy="37" r="31"></circle>
                    <circle id="speedRing" class="ring-value" cx="37" cy="37" r="31"></circle>
                </svg>
                <div class="speed-readout">
                    <strong id="speed">0</strong>
                    <span>km/h</span>
                </div>
                <div id="gear" class="gear">N</div>
            </div>

            <div class="vehicle-stats">
                <div id="fuelStat" class="stat">
                    <span class="ico">FUEL</span>
                    <span id="fuel">100%</span>
                </div>
                <div id="durabilityStat" class="stat durability">
                    <span class="ico">DMG</span>
                    <span class="bar"><i id="durabilityBar"></i></span>
                    <span id="durability">100%</span>
                </div>
                <div id="engineStat" class="stat icon-only" title="Engine">ENG</div>
                <div id="lockStat" class="stat icon-only" title="Lock">LOCK</div>
                <div id="beltStat" class="stat icon-only belt" title="Seatbelt">BELT</div>
                <div id="micStat" class="stat icon-only mic" title="Voice">MIC</div>
            </div>
        </section>

        <section id="playerInfo" class="player-info hidden" aria-hidden="true">
            <span>ID: <b id="playerId">0</b></span>
            <span>Date: <b id="dateText">--/--/--</b></span>
            <span>Time: <b id="timeText">--:--</b></span>
            <span id="playerVoice" class="player-voice">[P] Normal</span>
        </section>

        <section id="statusHud" class="status-hud">
            <div id="hpRow" class="status-row hp">
                <span>HP</span>
                <b><i id="hpBar"></i></b>
                <em id="hpText">100</em>
            </div>
            <div class="status-row armor">
                <span>ARM</span>
                <b><i id="armorBar"></i></b>
                <em id="armorText">0</em>
            </div>
            <div id="hungerRow" class="status-row hunger">
                <span>FOOD</span>
                <b><i id="hungerBar"></i></b>
                <em id="hungerText">100</em>
            </div>
            <div id="stressRow" class="status-row stress">
                <span>MIND</span>
                <b><i id="stressBar"></i></b>
                <em id="stressText">0</em>
            </div>
        </section>

        <section id="alertBox" class="alert-box hidden">ENGINE FAILURE</section>
        <section id="refuelBox" class="refuel-box hidden">
            <span>REFUELING</span>
            <b><i id="refuelBar"></i></b>
        </section>
    </main>

    <audio id="seatbelt_on" src="sounds/seatbelt_on.ogg" preload="auto"></audio>
    <audio id="seatbelt_off" src="sounds/seatbelt_off.ogg" preload="auto"></audio>
    <audio id="seatbelt_warning" src="sounds/seatbelt_warning.ogg" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
